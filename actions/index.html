<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>Action Constraint Lab — Folding in motion (v3.5)</title>
  <link rel="stylesheet" href="style.css">
  <style>html.embed body > header { display: none; }</style>
  <script>if (new URLSearchParams(location.search).get('embed') === '1') document.documentElement.classList.add('embed');</script>
</head>
<body>
  <header>
    <h1>Action Constraint Lab (v3.5)</h1>
    <p>制約畳み込みでアクションゲームを書く実験場。1つのHTMLから複数のJSデモを切替えて確認する。</p>
    <p class="ref">理論: <a href="ACTION_NATIVE_FOLDING_GUIDE.md">ACTION_NATIVE_FOLDING_GUIDE.md</a> / <a href="../CONSTRAINT_FOLDING_MASTER.md">CONSTRAINT_FOLDING_MASTER.md</a> / <a href="../AI_NATIVE_MASTER_BIBLE.md">Bible v3.5 (AI-Eyes & 3Dplus)</a></p>
    <p style="background: #fff3cd; border-left: 6px solid #f59e0b; padding: 8px 14px; margin: 8px 0; font-size: 13px;">
      <strong>Note:</strong> このデモは ai-desk <strong>v1</strong> ベース。
      次世代版 <a href="../v2/"><code>v2/</code></a>(All-as-Block)は MVP 段階で、デモは未作成です。
    </p>
  </header>
  <main>
    <nav id="demo-nav"></nav>
    <section id="stage">
      <h2 id="stage-title">— select a demo —</h2>
      <p id="stage-desc"></p>
      <p id="stage-controls"></p>
      <div id="stage-area">
        <canvas id="stage-canvas" width="720" height="320" tabindex="0"></canvas>
        <aside id="stage-side"></aside>
      </div>
      <div id="stage-controls-row">
        <button id="reset-btn">Reset</button>
        <span id="stage-status"></span>
      </div>
    </section>
  </main>

  <!-- registry first -->
  <script src="hub.js"></script>
  <!-- demos register themselves on load (logic先・demo後) -->
  <script src="demos/fighter-cancel.logic.js"></script>
  <script src="demos/fighter-cancel.js"></script>
  <!-- launcher last -->
  <script>ActionLab.boot();</script>
</body>
</html>
