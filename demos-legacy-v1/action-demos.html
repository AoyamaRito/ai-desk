<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>Action Game Constraint Demos — Playable (v3.5)</title>
  <link rel="stylesheet" href="action-demos.css">
  <style>html.embed body > header { display: none; }</style>
  <script>if (new URLSearchParams(location.search).get('embed') === '1') document.documentElement.classList.add('embed');</script>
</head>
<body>
  <header>
    <h1>Action Game Constraint Demos</h1>

  <main>
    <nav id="demo-list"></nav>
    <section id="playground">
      <h2 id="game-title"></h2>
      <p id="game-desc"></p>
      <p id="game-controls"></p>
      <canvas id="game-canvas" width="720" height="320" tabindex="0"></canvas>
      <button id="reset-btn">Reset</button>

  </main>
  <script src="action-demos.js"></script>
  <script src="action-demos-ui.js"></script>
