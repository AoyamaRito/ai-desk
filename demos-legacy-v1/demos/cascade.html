<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Color Cascade — ai-desk demo</title>
<style>
:root {
  --fg: #1a0f24;
  --accent: #00c4cc;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html.embed body > header { display: none; }
html, body { height: 100%; }
body {
  background: linear-gradient(135deg, #d8f4ee 0%, #fff5e6 100%);
  color: var(--fg);
  font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", system-ui, sans-serif;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}
header {
  padding: 14px 20px;
  border-bottom: 3px solid var(--fg);
  background: #ffffff;
}
header h1 { font-size: 18px; font-weight: 800; }
header p { font-size: 13px; color: #555; margin-top: 2px; }
main {
  flex: 1 1 auto;
  position: relative;
  touch-action: manipulation;
}
canvas { display: block; width: 100%; height: 100%; cursor: pointer; }
.hud {
  position: absolute;
  top: 14px; left: 14px;
  background: rgba(255,255,255,0.92);
  border: 3px solid var(--fg);
  padding: 8px 14px;
  font-weight: 800;
  font-size: 13px;
  pointer-events: none;
  display: flex;
  gap: 16px;
}
.hud .num { color: var(--accent); font-size: 18px; vertical-align: -1px; margin-left: 4px; }
.hud .best { color: #ff1d6d; font-size: 18px; vertical-align: -1px; margin-left: 4px; }
.controls {
  position: absolute;
  bottom: 14px; right: 14px;
}
.btn {
  background: #ffffff;
  border: 3px solid var(--fg);
  color: var(--fg);
  padding: 8px 16px;
  font-weight: 800;
  font-size: 13px;
  cursor: pointer;
  letter-spacing: 0.04em;
  font-family: inherit;
}
.btn:hover { background: var(--fg); color: #ffffff; }
</style>
<script>
(function() {
  const q = new URLSearchParams(location.search);
  if (q.get('embed') === '1') document.documentElement.classList.add('embed');
  if (q.get('lang') === 'en') {
    const T = { intro: 'Click a cell — same-color neighbors flip in a domino chain. How many can you topple in one move?', label: 'Chain:' };
    document.addEventListener('DOMContentLoaded', () => {
      document.querySelectorAll('[data-i18n]').forEach(el => { const k = el.getAttribute('data-i18n'); if (T[k]) el.textContent = T[k]; });
      document.documentElement.lang = 'en';
    });
  }
})();
</script>
</head>
<body>

<header>
  <h1>Color Cascade</h1>
  <p data-i18n="intro">セルをクリック → 同じ色の隣がドミノみたいに連鎖反転。一手で何個倒せるか。</p>
</header>

<main>
  <canvas id="c"></canvas>
  <div class="hud">
    <span><span data-i18n="label">連鎖:</span> <span class="num" id="chain">0</span></span>
    <span>Best: <span class="best" id="best">0</span></span>
  </div>
  <div class="controls">
    <button class="btn" id="reset">Reset</button>
  </div>
</main>

<script>
const COLORS = ['#ff1d6d', '#ffcc00', '#00c4cc', '#6b3aff', '#00d97e'];
const COLS = 18;
const ROWS = 12;
const RIPPLE_MS = 50;

const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const chainEl = document.getElementById('chain');
const bestEl = document.getElementById('best');
let W = 0, H = 0;
let cellW = 0, cellH = 0;
let grid = [];
let pulses = [];
let best = 0;

function resize() {
  const dpr = window.devicePixelRatio || 1;
  const r = canvas.getBoundingClientRect();
  W = r.width; H = r.height;
  canvas.width = W * dpr;
  canvas.height = H * dpr;
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  cellW = W / COLS;
  cellH = H / ROWS;
}
window.addEventListener('resize', resize);

function reset() {
  grid = [];
  for (let y = 0; y < ROWS; y++) {
    const row = [];
    for (let x = 0; x < COLS; x++) {
      row.push({ color: COLORS[Math.floor(Math.random() * COLORS.length)], pulse: 0 });
    }
    grid.push(row);
  }
  pulses = [];
  chainEl.textContent = 0;
}

function pickColor(except) {
  let c;
  do { c = COLORS[Math.floor(Math.random() * COLORS.length)]; } while (c === except);
  return c;
}

function cascade(sx, sy) {
  const oldColor = grid[sy][sx].color;
  const newColor = pickColor(oldColor);
  const visited = new Set();
  const queue = [[sx, sy, 0]];
  visited.add(sx + ',' + sy);
  let count = 0;
  while (queue.length) {
    const [x, y, depth] = queue.shift();
    pulses.push({ x, y, t: depth * RIPPLE_MS, oldColor, newColor });
    count++;
    const dirs = [[1,0],[-1,0],[0,1],[0,-1]];
    for (const [dx, dy] of dirs) {
      const nx = x + dx, ny = y + dy;
      if (nx < 0 || nx >= COLS || ny < 0 || ny >= ROWS) continue;
      const k = nx + ',' + ny;
      if (visited.has(k)) continue;
      if (grid[ny][nx].color !== oldColor) continue;
      visited.add(k);
      queue.push([nx, ny, depth + 1]);
    }
  }
  chainEl.textContent = count;
  if (count > best) {
    best = count;
    bestEl.textContent = best;
  }
}

let lastTime = performance.now();
function step(now) {
  const dt = now - lastTime;
  lastTime = now;

  // process pulses ready to flip
  for (let i = pulses.length - 1; i >= 0; i--) {
    const p = pulses[i];
    p.t -= dt;
    if (p.t <= 0) {
      grid[p.y][p.x].color = p.newColor;
      grid[p.y][p.x].pulse = 1;
      pulses.splice(i, 1);
    }
  }

  ctx.clearRect(0, 0, W, H);
  for (let y = 0; y < ROWS; y++) {
    for (let x = 0; x < COLS; x++) {
      const c = grid[y][x];
      const px = x * cellW, py = y * cellH;
      const pad = 2 - c.pulse * 4;
      const sz = cellW - pad * 2;
      const sh = cellH - pad * 2;
      ctx.fillStyle = c.color;
      ctx.fillRect(px + pad, py + pad, sz, sh);
      if (c.pulse > 0.05) {
        ctx.lineWidth = 2 + c.pulse * 3;
        ctx.strokeStyle = '#1a0f24';
        ctx.strokeRect(px + pad, py + pad, sz, sh);
      }
      c.pulse *= 0.88;
    }
  }
  requestAnimationFrame(step);
}

canvas.addEventListener('pointerdown', e => {
  const r = canvas.getBoundingClientRect();
  const t = e.touches ? e.touches[0] : e;
  const x = Math.floor((t.clientX - r.left) / cellW);
  const y = Math.floor((t.clientY - r.top) / cellH);
  if (x < 0 || x >= COLS || y < 0 || y >= ROWS) return;
  cascade(x, y);
});

document.getElementById('reset').addEventListener('click', reset);

resize();
reset();
requestAnimationFrame(step);
</script>
</body>
</html>
