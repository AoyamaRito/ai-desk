<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Space Race — ai-desk demo</title>
<style>
:root { --fg: #1a0f24; --accent: #00c4cc; }
* { box-sizing: border-box; margin: 0; padding: 0; }
html.embed body > header { display: none; }
html, body { height: 100%; }
body {
  background: #050010;
  color: #e6e6f0;
  font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", system-ui, sans-serif;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}
header {
  padding: 14px 20px;
  border-bottom: 3px solid var(--fg);
  background: #ffffff;
  color: var(--fg);
}
header h1 { font-size: 18px; font-weight: 800; }
header p { font-size: 13px; color: #555; margin-top: 2px; }
main {
  flex: 1 1 auto;
  position: relative;
  cursor: crosshair;
  touch-action: none;
}
canvas { display: block; width: 100%; height: 100%; }
.hud {
  position: absolute;
  top: 12px; left: 12px;
  background: rgba(0,0,0,0.55);
  border: 2px solid var(--accent);
  padding: 8px 14px;
  font-weight: 800;
  font-size: 13px;
  color: #e6e6f0;
  pointer-events: none;
  letter-spacing: 0.04em;
}
.hud .num { color: var(--accent); font-size: 22px; vertical-align: -2px; margin-left: 4px; display: inline-block; transition: color 0.25s ease; }
.hud .num.pulse { animation: numpulse 0.5s cubic-bezier(0.34,1.56,0.64,1); }
@keyframes numpulse {
  0%   { transform: scale(1); }
  35%  { transform: scale(1.7); }
  100% { transform: scale(1); }
}
.help {
  position: absolute;
  top: 12px; right: 12px;
  background: rgba(0,0,0,0.55);
  border: 2px solid #6b3aff;
  padding: 6px 12px;
  font-size: 11px;
  color: #c4abf5;
  pointer-events: none;
  line-height: 1.5;
  text-align: right;
}
.win {
  position: absolute;
  top: 50%; left: 50%;
  transform: translate(-50%,-50%) scale(0.6);
  background: var(--accent);
  color: #000;
  padding: 16px 28px;
  font-size: 22px;
  font-weight: 900;
  letter-spacing: 0.1em;
  opacity: 0;
  transition: opacity 0.5s ease, transform 0.5s cubic-bezier(0.34,1.56,0.64,1);
  pointer-events: none;
}
.win.show { opacity: 1; transform: translate(-50%,-50%) scale(1); }
</style>
<script>
(function() {
  const q = new URLSearchParams(location.search);
  if (q.get('embed') === '1') document.documentElement.classList.add('embed');
  if (q.get('lang') === 'en') {
    const T = {
      intro: 'Drag (or arrow keys) to steer through the rings. Radar is bottom-left; the next ring is shown in pink.',
      passed: 'Passed', speed: 'Speed', help: 'drag / arrow keys: rotate'
    };
    document.addEventListener('DOMContentLoaded', () => {
      document.querySelectorAll('[data-i18n]').forEach(el => { const k = el.getAttribute('data-i18n'); if (T[k]) el.innerHTML = T[k].replace(/\n/g, '<br>'); });
      document.documentElement.lang = 'en';
    });
  }
})();
</script>
</head>
<body>

<header>
  <h1>Space Race</h1>
  <p data-i18n="intro">ドラッグ (or 矢印キー) で進行方向を変えながらリングをくぐる。レーダーは左下、次のリングはピンクで表示。</p>
</header>

<main>
  <canvas id="c"></canvas>
  <div class="hud"><span data-i18n="passed">通過</span> <span class="num" id="num">0</span>　|　<span data-i18n="speed">速度</span> <span class="num" id="spd">240</span></div>
  <div class="help" data-i18n="help">drag / arrow keys: 旋回<br>auto-thrust forward</div>
  <div class="win" id="win">RING PASSED!</div>
</main>

<script>
// ============================================================
// Space Race — vanilla canvas 3D race demo (no deps)
//   - Camera moves forward at fixed velocity along its facing direction
//   - Drag (or arrow keys) rotates yaw / pitch
//   - 600 stars are scattered in a bubble around the camera and recycled
//   - 6 rings are placed ahead; passing one spawns the next
//   - Radar (bottom-left) shows top-down map of nearby rings + heading
// ============================================================

const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const numEl = document.getElementById('num');
const spdEl = document.getElementById('spd');
const winEl = document.getElementById('win');
let W = 0, H = 0, FOCAL = 600;

// camera (cam.yaw/pitch lerp toward targetYaw/Pitch for inertia feel)
const cam = { x: 0, y: 0, z: 0, yaw: 0, pitch: 0 };
let targetYaw = 0, targetPitch = 0;
const BASE_SPEED = 240;
const MAX_SPEED  = 1100;
let SPEED = BASE_SPEED;
// FOV punch on ring pass: focalCurrent dips, lerps back up
let baseFocal = 600;
let focalCurrent = 600;

// world
const STAR_COUNT = 600;
const STAR_RANGE = 3000;
const RING_COUNT = 8;
let stars = [];
let rings = [];
let meteors = [];
let passed = 0;
let nextMeteorIn = 0.6;

// input
const keys = {};
let dragging = false;
let dragLast = { x: 0, y: 0 };

// resize
function resize() {
  const dpr = window.devicePixelRatio || 1;
  const r = canvas.getBoundingClientRect();
  W = r.width; H = r.height;
  canvas.width = W * dpr;
  canvas.height = H * dpr;
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  baseFocal = Math.min(W, H) * 0.85;
  FOCAL = focalCurrent = baseFocal;
}
window.addEventListener('resize', resize);

// init
function initStars() {
  stars = [];
  for (let i = 0; i < STAR_COUNT; i++) {
    stars.push({
      x: cam.x + (Math.random() - 0.5) * STAR_RANGE * 2,
      y: cam.y + (Math.random() - 0.5) * STAR_RANGE * 2,
      z: cam.z + (Math.random() - 0.5) * STAR_RANGE * 2,
      bright: 0.3 + Math.random() * 0.7,
      tint: Math.random() < 0.15 ? '#ffcc00' : (Math.random() < 0.2 ? '#6b3aff' : '#ffffff'),
    });
  }
}
// pick a vivid hue for each ring so the tunnel rainbows ahead
const RING_HUES = [350, 200, 50, 280, 130, 25, 310, 170];
let ringSeq = 0;

// Chain new rings off the last ring (or camera) with a *small* perpendicular
// offset so consecutive rings form a smooth flying path that's always
// reachable from the previous one. spacing/offset stay in proportion so
// turning isn't required to pass each one — just gentle steering.
function spawnRing(spacing, baseRing) {
  const fwd = forward();
  const right = rightVec();
  const up = upVec();
  const bx = baseRing ? baseRing.x : cam.x;
  const by = baseRing ? baseRing.y : cam.y;
  const bz = baseRing ? baseRing.z : cam.z;
  // tight cone — ±35% of spacing in either perpendicular axis
  const offX = (Math.random() - 0.5) * spacing * 0.7;
  const offY = (Math.random() - 0.5) * spacing * 0.5;
  const hue = RING_HUES[ringSeq++ % RING_HUES.length];
  return {
    x: bx + fwd[0] * spacing + right[0] * offX + up[0] * offY,
    y: by + fwd[1] * spacing + right[1] * offX + up[1] * offY,
    z: bz + fwd[2] * spacing + right[2] * offX + up[2] * offY,
    radius: 95,
    hue,
    pulse: Math.random() * Math.PI * 2,
  };
}
function initRings() {
  rings = [];
  let prev = null;
  for (let i = 0; i < RING_COUNT; i++) {
    const r = spawnRing(i === 0 ? 380 : 360, prev);
    rings.push(r);
    prev = r;
  }
}

// vector helpers (inline, ai-desk style)
function forward() {
  return [
    Math.sin(cam.yaw) * Math.cos(cam.pitch),
    -Math.sin(cam.pitch),
    Math.cos(cam.yaw) * Math.cos(cam.pitch),
  ];
}
function rightVec() {
  return [Math.cos(cam.yaw), 0, -Math.sin(cam.yaw)];
}
function upVec() {
  const f = forward(), r = rightVec();
  return [
    r[1] * f[2] - r[2] * f[1],
    r[2] * f[0] - r[0] * f[2],
    r[0] * f[1] - r[1] * f[0],
  ];
}
function dot(a, b) { return a[0]*b[0] + a[1]*b[1] + a[2]*b[2]; }
function project(wx, wy, wz) {
  const r = rightVec(), u = upVec(), f = forward();
  const dx = wx - cam.x, dy = wy - cam.y, dz = wz - cam.z;
  const lz = dx*f[0] + dy*f[1] + dz*f[2];
  if (lz < 0.5) return null;
  const lx = dx*r[0] + dy*r[1] + dz*r[2];
  const ly = dx*u[0] + dy*u[1] + dz*u[2];
  return {
    x: (lx / lz) * focalCurrent + W / 2,
    y: -(ly / lz) * focalCurrent + H / 2,
    z: lz,
  };
}

// ring pass detection: ring is a sphere of radius `radius` perpendicular
// to the camera's path. Approximation: when ring's local z drops below a
// small threshold (camera passed it), check if perpendicular distance was
// within radius at closest approach.
function checkRingPass(ring) {
  const f = forward();
  const dx = ring.x - cam.x, dy = ring.y - cam.y, dz = ring.z - cam.z;
  const lz = dx*f[0] + dy*f[1] + dz*f[2];
  if (ring._lastZ === undefined) { ring._lastZ = lz; return false; }
  const passed = ring._lastZ > 0 && lz <= 0;
  if (passed) {
    // perpendicular distance at the moment ring's z plane is crossed
    const r = rightVec(), u = upVec();
    const lx = dx*r[0] + dy*r[1] + dz*r[2];
    const ly = dx*u[0] + dy*u[1] + dz*u[2];
    const perp = Math.hypot(lx, ly);
    ring._lastZ = lz;
    return perp < ring.radius;
  }
  ring._lastZ = lz;
  return false;
}

// star recycle: keep stars within bubble around camera
function recycleStar(s) {
  const dx = s.x - cam.x, dy = s.y - cam.y, dz = s.z - cam.z;
  const dist = Math.hypot(dx, dy, dz);
  if (dist > STAR_RANGE) {
    // place ahead of camera randomly
    const f = forward();
    const r = rightVec();
    const u = upVec();
    const ahead = STAR_RANGE * (0.3 + Math.random() * 0.7);
    const offR = (Math.random() - 0.5) * STAR_RANGE * 1.4;
    const offU = (Math.random() - 0.5) * STAR_RANGE * 1.4;
    s.x = cam.x + f[0] * ahead + r[0] * offR + u[0] * offU;
    s.y = cam.y + f[1] * ahead + r[1] * offR + u[1] * offU;
    s.z = cam.z + f[2] * ahead + r[2] * offR + u[2] * offU;
  }
}

// draw ring as projected circle: sample N points around ring perimeter
// (in ring's local plane perpendicular to camera path) and project.
// Three-pass stroke (wide soft halo + medium bloom + crisp white core)
// gives the rings a strong neon glow. Next ring is brighter and pulses.
function drawRing(ring, isNext) {
  const rb = rightVec();
  const ub = upVec();
  const N = 40;
  const pts = [];
  let visible = false;
  for (let i = 0; i < N; i++) {
    const a = (i / N) * Math.PI * 2;
    const wx = ring.x + Math.cos(a) * ring.radius * rb[0] + Math.sin(a) * ring.radius * ub[0];
    const wy = ring.y + Math.cos(a) * ring.radius * rb[1] + Math.sin(a) * ring.radius * ub[1];
    const wz = ring.z + Math.cos(a) * ring.radius * rb[2] + Math.sin(a) * ring.radius * ub[2];
    const p = project(wx, wy, wz);
    pts.push(p);
    if (p) visible = true;
  }
  if (!visible) return;

  const center = project(ring.x, ring.y, ring.z);
  const z = center ? center.z : 1000;
  const distFade = Math.max(0.18, Math.min(1, 1 - z / 4500));
  const pulse = isNext ? (0.65 + 0.35 * Math.sin(ring.pulse)) : 1;

  function tracePath() {
    ctx.beginPath();
    let started = false;
    for (const p of pts) {
      if (!p) { started = false; continue; }
      if (!started) { ctx.moveTo(p.x, p.y); started = true; }
      else ctx.lineTo(p.x, p.y);
    }
    if (pts[0]) ctx.lineTo(pts[0].x, pts[0].y);
  }

  const baseColor = `hsl(${ring.hue}, 95%, 60%)`;
  const lightColor = `hsl(${ring.hue}, 100%, 75%)`;
  ctx.shadowColor = baseColor;

  // pass 1: wide soft halo
  ctx.lineWidth = (isNext ? 14 : 8) * pulse;
  ctx.strokeStyle = `hsla(${ring.hue}, 100%, 60%, ${0.18 * distFade})`;
  ctx.shadowBlur = isNext ? 36 : 22;
  tracePath(); ctx.stroke();

  // pass 2: medium bloom
  ctx.lineWidth = (isNext ? 6 : 4) * pulse;
  ctx.strokeStyle = `hsla(${ring.hue}, 100%, 65%, ${0.55 * distFade})`;
  ctx.shadowBlur = isNext ? 22 : 14;
  tracePath(); ctx.stroke();

  // pass 3: crisp inner core (white-hot for next ring)
  ctx.lineWidth = isNext ? 2.2 : 1.6;
  ctx.strokeStyle = isNext ? `rgba(255,255,255,${distFade})` : `rgba(255,255,255,${0.7 * distFade})`;
  ctx.shadowBlur = 6;
  tracePath(); ctx.stroke();

  ctx.shadowBlur = 0;
}

// radar (bottom-left)
function drawRadar() {
  const size = Math.min(160, W * 0.22);
  const cx = 16 + size / 2, cy = H - 16 - size / 2;
  // bg
  ctx.fillStyle = 'rgba(0, 20, 30, 0.78)';
  ctx.beginPath();
  ctx.arc(cx, cy, size / 2, 0, Math.PI * 2);
  ctx.fill();
  ctx.strokeStyle = '#00c4cc';
  ctx.lineWidth = 2;
  ctx.stroke();
  // crosshair + range rings
  ctx.strokeStyle = 'rgba(0, 196, 204, 0.3)';
  ctx.lineWidth = 1;
  for (let r = size / 6; r < size / 2; r += size / 6) {
    ctx.beginPath(); ctx.arc(cx, cy, r, 0, Math.PI * 2); ctx.stroke();
  }
  // player triangle (always pointing up = forward)
  ctx.fillStyle = '#ffffff';
  ctx.beginPath();
  ctx.moveTo(cx, cy - 6);
  ctx.lineTo(cx - 5, cy + 5);
  ctx.lineTo(cx + 5, cy + 5);
  ctx.closePath(); ctx.fill();
  // rings: project to 2D using camera's right/forward axes (top-down)
  const RANGE = 2400;
  const f = forward();
  const r = rightVec();
  rings.forEach((ring, i) => {
    const dx = ring.x - cam.x, dy = ring.y - cam.y, dz = ring.z - cam.z;
    const localR = dx*r[0] + dy*r[1] + dz*r[2];
    const localF = dx*f[0] + dy*f[1] + dz*f[2];
    const dist = Math.hypot(localR, localF);
    if (dist > RANGE) return;
    const px = cx + (localR / RANGE) * (size / 2);
    const py = cy - (localF / RANGE) * (size / 2);
    ctx.fillStyle = i === 0 ? '#ff1d6d' : '#00c4cc';
    ctx.beginPath();
    ctx.arc(px, py, i === 0 ? 5 : 3, 0, Math.PI * 2);
    ctx.fill();
  });
}

// flash on ring pass
let flash = 0;

// 3D particle pool (used for ring-pass burst + engine plume)
const particles = [];
function spawnRingBurst(x, y, z) {
  const COLORS = ['#ff1d6d', '#ffcc00', '#00c4cc', '#a78bfa', '#ffffff'];
  for (let i = 0; i < 120; i++) {
    const theta = Math.random() * Math.PI * 2;
    const phi = Math.acos(2 * Math.random() - 1);
    const sp = 60 + Math.random() * 220;
    particles.push({
      x, y, z,
      vx: Math.sin(phi) * Math.cos(theta) * sp,
      vy: Math.sin(phi) * Math.sin(theta) * sp,
      vz: Math.cos(phi) * sp * 0.5, // bias outward laterally
      life: 1,
      decay: 0.4 + Math.random() * 0.4,
      r: 1.5 + Math.random() * 2.5,
      color: COLORS[Math.floor(Math.random() * COLORS.length)],
    });
  }
}
function spawnMeteor() {
  // emit somewhere within the bubble around the camera, moving fast
  // perpendicular-ish to the camera's forward direction so it streaks
  // across the visible field rather than into/out of the screen.
  const f = forward(), r = rightVec(), u = upVec();
  const aheadDist = 800 + Math.random() * 1200;
  const sideDir = Math.random() < 0.5 ? -1 : 1;
  const startSide = sideDir * (1100 + Math.random() * 600);
  const startUp   = (Math.random() - 0.5) * 800;
  const startX = cam.x + f[0] * aheadDist + r[0] * startSide + u[0] * startUp;
  const startY = cam.y + f[1] * aheadDist + r[1] * startSide + u[1] * startUp;
  const startZ = cam.z + f[2] * aheadDist + r[2] * startSide + u[2] * startUp;
  const speed = 700 + Math.random() * 500;
  // travel mainly perpendicular to forward (cross the screen), with slight
  // forward bias so it doesn't immediately leave behind the camera
  const dirSide = -sideDir;
  const dirUp   = (Math.random() - 0.5) * 0.7;
  const dirFwd  = (Math.random() - 0.5) * 0.4;
  const norm = Math.hypot(dirSide, dirUp, dirFwd);
  const palette = ['#ffffff', '#ffcc00', '#00f5ff', '#ff8d3a'];
  meteors.push({
    x: startX, y: startY, z: startZ,
    vx: (r[0] * dirSide + u[0] * dirUp + f[0] * dirFwd) / norm * speed,
    vy: (r[1] * dirSide + u[1] * dirUp + f[1] * dirFwd) / norm * speed,
    vz: (r[2] * dirSide + u[2] * dirUp + f[2] * dirFwd) / norm * speed,
    life: 1,
    color: palette[Math.floor(Math.random() * palette.length)],
  });
}
function spawnEnginePlume() {
  const r = rightVec(), u = upVec(), f = forward();
  // emit from ship rear (matches new tiny ship — local 0,-1.5,22)
  const ex = cam.x + r[0] * 0 + u[0] * (-1.5) + f[0] * 22;
  const ey = cam.y + r[1] * 0 + u[1] * (-1.5) + f[1] * 22;
  const ez = cam.z + r[2] * 0 + u[2] * (-1.5) + f[2] * 22;
  for (let i = 0; i < 3; i++) {
    const jitter = 0.6;
    particles.push({
      x: ex, y: ey, z: ez,
      vx: -f[0] * (50 + Math.random() * 80) + (Math.random() - 0.5) * 30,
      vy: -f[1] * (50 + Math.random() * 80) + (Math.random() - 0.5) * 30,
      vz: -f[2] * (50 + Math.random() * 80) + (Math.random() - 0.5) * 30,
      life: 0.9,
      decay: 1.4,
      r: 2 + Math.random() * 3,
      color: Math.random() < 0.4 ? '#ffcc00' : (Math.random() < 0.5 ? '#ff8d3a' : '#ffffff'),
    });
  }
}

// ---- player ship: small glowing wireframe tetrahedron in camera-local space.
// Coordinates are (right, up, forward). x/y at 1/4 scale of original so the
// ship reads as a small marker that doesn't block the view.
const SHIP_LOCAL = [
  { x:  0,    y: -0.75, z: 38 },  // 0: nose
  { x: -1.75, y: -2.25, z: 22 },  // 1: rear lower-left
  { x:  1.75, y: -2.25, z: 22 },  // 2: rear lower-right
  { x:  0,    y:  0.25, z: 22 },  // 3: rear top
];
// 6 edges of a tetrahedron
const SHIP_EDGES = [[0,1],[0,2],[0,3],[1,2],[2,3],[3,1]];
function localToWorld(lp) {
  const r = rightVec(), u = upVec(), f = forward();
  return {
    x: cam.x + r[0] * lp.x + u[0] * lp.y + f[0] * lp.z,
    y: cam.y + r[1] * lp.x + u[1] * lp.y + f[1] * lp.z,
    z: cam.z + r[2] * lp.x + u[2] * lp.y + f[2] * lp.z,
  };
}
function drawShip() {
  const proj = SHIP_LOCAL.map(lp => {
    const w = localToWorld(lp);
    return project(w.x, w.y, w.z);
  });
  if (proj.some(p => !p)) return;
  // two-pass glow: outer wide blur soft, inner crisp bright
  ctx.shadowColor = '#00f5ff';
  ctx.strokeStyle = 'rgba(0, 245, 255, 0.55)';
  ctx.lineWidth = 1.5;
  ctx.shadowBlur = 22;
  for (const [a, b] of SHIP_EDGES) {
    ctx.beginPath();
    ctx.moveTo(proj[a].x, proj[a].y);
    ctx.lineTo(proj[b].x, proj[b].y);
    ctx.stroke();
  }
  ctx.strokeStyle = '#ffffff';
  ctx.lineWidth = 1;
  ctx.shadowBlur = 8;
  for (const [a, b] of SHIP_EDGES) {
    ctx.beginPath();
    ctx.moveTo(proj[a].x, proj[a].y);
    ctx.lineTo(proj[b].x, proj[b].y);
    ctx.stroke();
  }
  ctx.shadowBlur = 0;
}

// loop
let lastTime = performance.now();
function step(now) {
  const dt = Math.min(0.05, (now - lastTime) / 1000);
  lastTime = now;

  // input → target angles (cam lerps toward target for inertia feel)
  const yawSpeed = 1.6, pitchSpeed = 1.2;
  if (keys['ArrowLeft']  || keys['a']) targetYaw   -= yawSpeed * dt;
  if (keys['ArrowRight'] || keys['d']) targetYaw   += yawSpeed * dt;
  if (keys['ArrowUp']    || keys['w']) targetPitch -= pitchSpeed * dt;
  if (keys['ArrowDown']  || keys['s']) targetPitch += pitchSpeed * dt;
  targetPitch = Math.max(-1.3, Math.min(1.3, targetPitch));
  // smoothing — frame-rate independent ~6Hz follow
  const k = 1 - Math.pow(0.0006, dt);
  cam.yaw   += (targetYaw   - cam.yaw)   * k;
  cam.pitch += (targetPitch - cam.pitch) * k;
  // FOV recovery
  focalCurrent += (baseFocal - focalCurrent) * (1 - Math.pow(0.05, dt));

  // forward thrust
  const f = forward();
  cam.x += f[0] * SPEED * dt;
  cam.y += f[1] * SPEED * dt;
  cam.z += f[2] * SPEED * dt;

  // ring collision (only check next ring)
  if (rings.length > 0 && checkRingPass(rings[0])) {
    const passedRing = rings.shift();
    spawnRingBurst(passedRing.x, passedRing.y, passedRing.z);
    // chain next ring off the last one in queue so the rainbow tunnel
    // continues smoothly without huge gaps or off-screen jumps
    const tail = rings.length ? rings[rings.length - 1] : null;
    rings.push(spawnRing(360, tail));
    passed++;
    numEl.textContent = passed;
    // speed up — bigger boost so the player feels it; capped
    SPEED = Math.min(MAX_SPEED, SPEED + 45);
    spdEl.textContent = Math.round(SPEED);
    // colour-shift: yellow → orange → red as speed climbs
    const t = (SPEED - BASE_SPEED) / (MAX_SPEED - BASE_SPEED);
    spdEl.style.color = `hsl(${60 - t * 60}, 100%, 60%)`;
    // pulse animation on both numbers
    numEl.classList.remove('pulse'); void numEl.offsetWidth; numEl.classList.add('pulse');
    spdEl.classList.remove('pulse'); void spdEl.offsetWidth; spdEl.classList.add('pulse');
    // FOV punch — focal dips wide then recovers, feels like acceleration
    focalCurrent = baseFocal * 0.72;
    flash = 1;
    winEl.classList.add('show');
    setTimeout(() => winEl.classList.remove('show'), 600);
  }
  // animate ring pulse for the next ring
  if (rings.length > 0) rings[0].pulse += dt * 6;

  // continuous engine plume (rate scales with speed for more thrust at high SPEED)
  const plumeRate = 1 + Math.floor((SPEED - BASE_SPEED) / 120);
  for (let i = 0; i < plumeRate; i++) spawnEnginePlume();

  // meteors — periodic streaks across the bubble
  nextMeteorIn -= dt;
  if (nextMeteorIn <= 0) {
    nextMeteorIn = 0.4 + Math.random() * 1.4;
    spawnMeteor();
  }
  // update meteors (own array — emit trail particles each frame)
  for (let i = meteors.length - 1; i >= 0; i--) {
    const m = meteors[i];
    m.x += m.vx * dt;
    m.y += m.vy * dt;
    m.z += m.vz * dt;
    m.life -= dt * 0.4;
    // trail particles
    for (let j = 0; j < 2; j++) {
      particles.push({
        x: m.x + (Math.random() - 0.5) * 4,
        y: m.y + (Math.random() - 0.5) * 4,
        z: m.z + (Math.random() - 0.5) * 4,
        vx: m.vx * 0.05 + (Math.random() - 0.5) * 8,
        vy: m.vy * 0.05 + (Math.random() - 0.5) * 8,
        vz: m.vz * 0.05 + (Math.random() - 0.5) * 8,
        life: 0.7,
        decay: 1.6,
        r: 1.5 + Math.random() * 1.5,
        color: m.color,
      });
    }
    if (m.life <= 0) meteors.splice(i, 1);
  }

  // update particles
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx * dt;
    p.y += p.vy * dt;
    p.z += p.vz * dt;
    p.vx *= 0.96;
    p.vy *= 0.96;
    p.vz *= 0.96;
    p.life -= p.decay * dt;
    if (p.life <= 0) particles.splice(i, 1);
  }

  // recycle stars
  for (const s of stars) recycleStar(s);

  // ---- draw
  // motion-blurry trail
  ctx.fillStyle = 'rgba(5, 0, 16, 0.35)';
  ctx.fillRect(0, 0, W, H);

  // stars
  for (const s of stars) {
    const p = project(s.x, s.y, s.z);
    if (!p) continue;
    const sz = Math.max(0.4, (1.6 - p.z / 2500) * s.bright * 1.4);
    ctx.fillStyle = s.tint;
    ctx.globalAlpha = Math.min(1, s.bright * (1 - p.z / 3500));
    ctx.beginPath();
    ctx.arc(p.x, p.y, sz, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;

  // rings (back-to-front so closer overlays farther)
  const sortedRings = [...rings].map((r, i) => ({ r, i }));
  sortedRings.sort((a, b) => {
    const az = (a.r.x - cam.x) * f[0] + (a.r.y - cam.y) * f[1] + (a.r.z - cam.z) * f[2];
    const bz = (b.r.x - cam.x) * f[0] + (b.r.y - cam.y) * f[1] + (b.r.z - cam.z) * f[2];
    return bz - az;
  });
  for (const { r, i } of sortedRings) drawRing(r, i === 0);

  // meteors — flat-design 5-point stars in additive blend so overlaps glow
  ctx.globalCompositeOperation = 'lighter';
  for (const m of meteors) {
    const p = project(m.x, m.y, m.z);
    if (!p) continue;
    const sz = Math.max(3, (3 - p.z / 2000) * 4);
    ctx.globalAlpha = Math.min(1, m.life * 1.4);
    ctx.fillStyle = m.color;
    ctx.shadowColor = m.color;
    ctx.shadowBlur = 32;
    ctx.beginPath();
    for (let i = 0; i < 10; i++) {
      const r = (i % 2 === 0) ? sz : sz * 0.42;
      const a = (i / 10) * Math.PI * 2 - Math.PI / 2;
      const x = p.x + Math.cos(a) * r;
      const y = p.y + Math.sin(a) * r;
      if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
    }
    ctx.closePath();
    ctx.fill();
  }
  ctx.shadowBlur = 0;
  ctx.globalAlpha = 1;
  ctx.globalCompositeOperation = 'source-over';

  // 3D particles (drawn after rings, before ship)
  // sort approximately back-to-front by local z so glow blends sanely
  for (const p of particles) {
    const proj = project(p.x, p.y, p.z);
    if (!proj) continue;
    const a = Math.max(0, Math.min(1, p.life));
    const sz = Math.max(0.5, p.r * (1.4 - proj.z / 3000));
    ctx.globalAlpha = a;
    ctx.fillStyle = p.color;
    ctx.shadowColor = p.color;
    ctx.shadowBlur = 12;
    ctx.beginPath();
    ctx.arc(proj.x, proj.y, sz, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;
  ctx.shadowBlur = 0;

  // player ship (drawn after rings/particles so always visible)
  drawShip();

  // pass flash
  if (flash > 0) {
    ctx.fillStyle = `rgba(255, 255, 255, ${flash * 0.4})`;
    ctx.fillRect(0, 0, W, H);
    flash *= 0.85;
  }

  // radar overlay
  drawRadar();

  requestAnimationFrame(step);
}

// drag rotation
function pointerXY(e) {
  const r = canvas.getBoundingClientRect();
  const t = e.touches ? e.touches[0] : e;
  return { x: t.clientX - r.left, y: t.clientY - r.top };
}
canvas.addEventListener('pointerdown', e => {
  dragging = true;
  const p = pointerXY(e);
  dragLast = p;
  canvas.setPointerCapture && canvas.setPointerCapture(e.pointerId);
});
canvas.addEventListener('pointermove', e => {
  if (!dragging) return;
  const p = pointerXY(e);
  const dx = p.x - dragLast.x;
  const dy = p.y - dragLast.y;
  // feed into target so inertia smoothing handles the actual motion
  targetYaw   += dx * 0.005;
  targetPitch += dy * 0.005;
  targetPitch = Math.max(-1.3, Math.min(1.3, targetPitch));
  dragLast = p;
});
canvas.addEventListener('pointerup',   () => { dragging = false; });
canvas.addEventListener('pointerleave',() => { dragging = false; });

window.addEventListener('keydown', e => {
  keys[e.key] = true;
  if (['ArrowLeft','ArrowRight','ArrowUp','ArrowDown',' '].includes(e.key)) e.preventDefault();
});
window.addEventListener('keyup', e => { keys[e.key] = false; });

resize();
initStars();
initRings();
requestAnimationFrame(step);
</script>
</body>
</html>
