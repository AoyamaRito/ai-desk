<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>ai-desk OG image source</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { width: 1200px; height: 630px; overflow: hidden; margin: 0; padding: 0; }
body {
  background: #ffffff;
  color: #1a0f24;
  font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic", system-ui, sans-serif;
  position: relative;
  border: 8px solid #1a0f24;
}
.inner {
  position: absolute;
  inset: 50px 70px;
}
.topbar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 32px; }
.dots { display: flex; gap: 12px; }
.author { margin-top: 24px; font-size: 18px; color: #4a3d5a; font-weight: 700; letter-spacing: 0.04em; }
.dot { width: 22px; height: 22px; }
.dot:nth-child(1) { background: #ff1d6d; }
.dot:nth-child(2) { background: #ffcc00; }
.dot:nth-child(3) { background: #00c4cc; }
.dot:nth-child(4) { background: #6b3aff; }
h1 {
  font-size: 148px;
  font-weight: 900;
  letter-spacing: -0.04em;
  line-height: 0.95;
  margin-bottom: 24px;
}
.tag {
  font-size: 34px;
  font-weight: 700;
  color: #1a0f24;
  margin-bottom: 12px;
}
.sub {
  font-size: 20px;
  color: #4a3d5a;
  font-weight: 500;
  line-height: 1.55;
  max-width: 880px;
}
.footer {
  position: absolute;
  bottom: 0;
  left: 0;
  right: 0;
  display: flex;
  justify-content: space-between;
  align-items: center;
  font-size: 20px;
  color: #4a3d5a;
  font-weight: 700;
  letter-spacing: 0.04em;
}
.url {
  font-family: "SF Mono", Menlo, Consolas, monospace;
  background: #1a0f24;
  color: #ffffff;
  padding: 8px 16px;
  font-size: 16px;
  font-weight: 700;
}
</style>
</head>
<body>
<div class="inner">
  <div class="topbar">
    <div class="dots">
      <div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div>
    </div>
    <span class="url">aoyamarito.github.io/ai-desk/en</span>
  </div>
  <h1>ai-desk</h1>
  <p class="tag">A foundation for letting AI write your programs</p>
  <p class="sub">All you do is tell the AI what you want, in plain language. The AI handles reading, writing, fixing, and testing the code.</p>
  <p class="author">Hiroyuki OKINOI / AoyamaRito</p>
</div>

</html>
