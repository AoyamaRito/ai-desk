<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Constraint Burst — ai-desk demo</title>
<style>
:root {
  --bg-a: #ffe5ec;
  --bg-b: #d8f4ee;
  --fg: #1a0f24;
  --accent: #ff1d6d;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html.embed body > header { display: none; }
html, body { height: 100%; }
body {
  background: linear-gradient(135deg, var(--bg-a) 0%, var(--bg-b) 100%);
  color: var(--fg);
  font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", system-ui, sans-serif;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}
header {
  padding: 14px 20px;
  border-bottom: 3px solid var(--fg);
  background: #ffffff;
}
header h1 { font-size: 18px; font-weight: 800; }
header p { font-size: 13px; color: #555; margin-top: 2px; }
main {
  flex: 1 1 auto;
  position: relative;
  cursor: crosshair;
  touch-action: manipulation;
}
canvas { display: block; width: 100%; height: 100%; }
.hud {
  position: absolute;
  top: 14px; left: 14px;
  background: rgba(255,255,255,0.92);
  border: 3px solid var(--fg);
  padding: 8px 14px;
  font-weight: 800;
  font-size: 14px;
  letter-spacing: 0.04em;
  pointer-events: none;
}
.hud .num { color: var(--accent); font-size: 20px; vertical-align: -1px; margin-left: 4px; }
.win {
  position: absolute;
  top: 50%; left: 50%;
  transform: translate(-50%,-50%) scale(0.6);
  background: var(--fg);
  color: #ffffff;
  padding: 18px 32px;
  font-size: 28px;
  font-weight: 900;
  letter-spacing: 0.06em;
  opacity: 0;
  transition: opacity 0.4s ease, transform 0.4s cubic-bezier(0.34,1.56,0.64,1);
  pointer-events: none;
}
.win.show { opacity: 1; transform: translate(-50%,-50%) scale(1); }
.controls {
  position: absolute;
  bottom: 14px; right: 14px;
  display: flex;
  gap: 8px;
}
.btn {
  background: #ffffff;
  border: 3px solid var(--fg);
  color: var(--fg);
  padding: 8px 16px;
  font-weight: 800;
  font-size: 13px;
  cursor: pointer;
  letter-spacing: 0.04em;
  font-family: inherit;
}
.btn:hover { background: var(--fg); color: #ffffff; }
.btn:active { transform: translateY(1px); }
.swatches {
  position: absolute;
  bottom: 14px; left: 14px;
  display: flex;
  gap: 6px;
}
.sw {
  width: 30px; height: 30px;
  border: 3px solid var(--fg);
  cursor: pointer;
  transition: transform 0.1s ease;
}
.sw:hover { transform: translateY(-2px); }
.sw.active { transform: translateY(-4px) scale(1.15); }
</style>
<script>
(function() {
  const q = new URLSearchParams(location.search);
  if (q.get('embed') === '1') document.documentElement.classList.add('embed');
  const lang = q.get('lang') === 'en' ? 'en' : 'ja';
  if (lang === 'en') {
    const T = { intro: 'Click to spread color. Win when every ball is one color.', label: 'Colors:' };
    document.addEventListener('DOMContentLoaded', () => {
      document.querySelectorAll('[data-i18n]').forEach(el => { const k = el.getAttribute('data-i18n'); if (T[k]) el.textContent = T[k]; });
      document.documentElement.lang = 'en';
    });
  }
})();
</script>
</head>
<body>

<header>
  <h1>Constraint Burst</h1>
  <p data-i18n="intro">クリックで色を伝播。全部ひとつの色になったら勝ち。</p>
</header>

<main>
  <canvas id="c"></canvas>
  <div class="hud"><span data-i18n="label">残り色:</span> <span class="num" id="num">—</span></div>
  <div class="win" id="win">ALL ONE!</div>
  <div class="swatches" id="swatches"></div>
  <div class="controls">
    <button class="btn" id="reset">Reset</button>
  </div>
</main>

<script>
const COLORS = ['#ff1d6d', '#ffcc00', '#00c4cc', '#6b3aff', '#00d97e'];
const NUM_BALLS = 60;
const RADIUS = 110;

const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const numEl = document.getElementById('num');
const winEl = document.getElementById('win');
const swatchesEl = document.getElementById('swatches');
let W = 0, H = 0;

let activeColor = COLORS[0];
let balls = [];
let particles = [];

function resize() {
  const dpr = window.devicePixelRatio || 1;
  const r = canvas.getBoundingClientRect();
  W = r.width; H = r.height;
  canvas.width = W * dpr;
  canvas.height = H * dpr;
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
}
window.addEventListener('resize', resize);

function reset() {
  balls = [];
  for (let i = 0; i < NUM_BALLS; i++) {
    balls.push({
      x: Math.random() * W,
      y: Math.random() * H,
      vx: (Math.random() - 0.5) * 1.6,
      vy: (Math.random() - 0.5) * 1.6,
      r: 14 + Math.random() * 10,
      color: COLORS[Math.floor(Math.random() * COLORS.length)],
      pulse: 0,
    });
  }
  particles = [];
  winEl.classList.remove('show');
}

function buildSwatches() {
  swatchesEl.innerHTML = '';
  COLORS.forEach((c, i) => {
    const sw = document.createElement('div');
    sw.className = 'sw' + (i === 0 ? ' active' : '');
    sw.style.background = c;
    sw.title = 'Pick this color';
    sw.addEventListener('click', () => {
      activeColor = c;
      swatchesEl.querySelectorAll('.sw').forEach(s => s.classList.remove('active'));
      sw.classList.add('active');
    });
    swatchesEl.appendChild(sw);
  });
}

function spawnBurst(x, y, color, n) {
  for (let i = 0; i < n; i++) {
    const a = Math.random() * Math.PI * 2;
    const sp = 1 + Math.random() * 5;
    particles.push({
      x, y,
      vx: Math.cos(a) * sp,
      vy: Math.sin(a) * sp,
      r: 2 + Math.random() * 3,
      life: 1,
      color,
    });
  }
}

function paint(cx, cy) {
  let hits = 0;
  for (const b of balls) {
    const dx = b.x - cx, dy = b.y - cy;
    const d = Math.hypot(dx, dy);
    if (d < RADIUS && b.color !== activeColor) {
      b.color = activeColor;
      b.pulse = 1;
      hits++;
    }
  }
  spawnBurst(cx, cy, activeColor, 14 + hits * 2);
  // Push effect
  for (const b of balls) {
    const dx = b.x - cx, dy = b.y - cy;
    const d = Math.hypot(dx, dy) + 0.001;
    if (d < RADIUS) {
      const force = (1 - d / RADIUS) * 4;
      b.vx += (dx / d) * force;
      b.vy += (dy / d) * force;
    }
  }
  checkWin();
}

function checkWin() {
  const set = new Set(balls.map(b => b.color));
  numEl.textContent = set.size;
  if (set.size === 1) {
    winEl.classList.add('show');
    // big celebration
    for (let i = 0; i < 60; i++) {
      spawnBurst(W / 2 + (Math.random() - 0.5) * 200, H / 2 + (Math.random() - 0.5) * 100, balls[0].color, 4);
    }
  }
}

function step() {
  ctx.clearRect(0, 0, W, H);

  for (const b of balls) {
    b.x += b.vx;
    b.y += b.vy;
    b.vx *= 0.992;
    b.vy *= 0.992;
    if (b.x < b.r) { b.x = b.r; b.vx *= -0.9; }
    if (b.x > W - b.r) { b.x = W - b.r; b.vx *= -0.9; }
    if (b.y < b.r) { b.y = b.r; b.vy *= -0.9; }
    if (b.y > H - b.r) { b.y = H - b.r; b.vy *= -0.9; }
    b.pulse *= 0.92;

    const r = b.r * (1 + b.pulse * 0.5);
    ctx.beginPath();
    ctx.arc(b.x, b.y, r, 0, Math.PI * 2);
    ctx.fillStyle = b.color;
    ctx.fill();
    ctx.lineWidth = 2;
    ctx.strokeStyle = '#1a0f24';
    ctx.stroke();
  }

  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx;
    p.y += p.vy;
    p.vx *= 0.97;
    p.vy *= 0.97;
    p.life -= 0.018;
    if (p.life <= 0) { particles.splice(i, 1); continue; }
    ctx.globalAlpha = p.life;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
    ctx.fillStyle = p.color;
    ctx.fill();
    ctx.globalAlpha = 1;
  }

  requestAnimationFrame(step);
}

function pointerXY(e) {
  const r = canvas.getBoundingClientRect();
  const t = e.touches ? e.touches[0] : e;
  return { x: t.clientX - r.left, y: t.clientY - r.top };
}

canvas.addEventListener('pointerdown', e => {
  const p = pointerXY(e);
  paint(p.x, p.y);
});

document.getElementById('reset').addEventListener('click', reset);

resize();
buildSwatches();
reset();
step();
</script>
</body>
</html>
